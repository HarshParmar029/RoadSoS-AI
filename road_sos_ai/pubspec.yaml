name: road_sos_ai
description: "AI-Powered Road Emergency Response System for Road Safety Hackathon 2026"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'     # ← Yeh line important hai

dependencies:
  flutter:
    sdk: flutter
  
  # Core Emergency Features
  flutter_callkit_incoming: ^3.0.0
  geolocator: ^13.0.0
  google_maps_flutter: ^2.17.0
  flutter_map: ^8.0.0
  speech_to_text: ^7.0.0
  google_generative_ai: ^0.4.0
  vibration: ^3.1.8
  shake: ^2.0.0
  url_launcher: ^6.3.1
  shared_preferences: ^2.3.0
  provider: ^6.1.2
  
  # Notifications
  flutter_local_notifications: ^18.0.0
  firebase_core: ^3.6.0
  firebase_messaging: ^15.0.0
  
  # UUID for call ID
  uuid: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/sounds/